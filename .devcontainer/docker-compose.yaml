version: '2'

networks:
  default:
    ipam:
      config:
        - subnet:   192.168.132.0/24 # In order to specify static IPs, we must explicitly declare subnet.
          ip_range: 192.168.132.128/25 # Range for dynamic IPs. We'll make sure to assign static IPs outside this range.

services:
  dnsmasq:
    image: ghcr.io/acbgbca/dnsmasq:latest@sha256:7d65aaed89d248d724e512e5d9fab9a86eeb2e11b0d84bd8fbb8919334ba5f18
    environment:
      - |
        DNSMASQ_CONF=
        address=/local/192.168.132.5
        address=/internal/192.168.132.5
        address=/homelab/192.168.132.5
    cap_add:
      - NET_ADMIN
    networks:
      default:
        ipv4_address: 192.168.132.2

  devcontainer:
    image: mcr.microsoft.com/devcontainers/base:2.1.7-ubuntu@sha256:4bcb1b466771b1ba1ea110e2a27daea2f6093f9527fb75ee59703ec89b5561cb
    volumes:
      - ../..:/workspaces
      - k3s-config:/k3s/config
      - k3s-data:/k3s/data
      - k3s-manifests:/k3s/manifests
    command: sleep infinity
    network_mode: service:k3s

  k3s:
    image: "rancher/k3s:v1.35.2-k3s1@sha256:c3184157c3048112bab0c3e17405991da486cb3413511eba23f7650efd70776b"
    command: server
    environment:
      - K3S_NODE_NAME=k3s
      - K3S_KUBECONFIG_MODE=644
    tmpfs:
    - /run
    - /var/run
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    privileged: true
    volumes:
    - k3s-data:/var/lib/rancher/k3s
    - k3s-config:/etc/rancher/k3s
    - k3s-manifests:/var/lib/rancher/k3s/server/manifests
    ports:
    - 6443:6443
    - 8080:80
    - 8443:443
    networks:
      default:
        ipv4_address: 192.168.132.5
    dns:
      - 192.168.132.2

  chromium:
    image: 'ghcr.io/linuxserver/chromium:latest@sha256:7a912ecd332b7eb3a2b156dbbcc0625c8c4d009f4e480177483afbc102f93914'
    container_name: chromium
    ports:
      - 3000:6901
    shm_size: "1gb"
    dns:
      - 192.168.132.2

volumes:
  k3s-config:
  k3s-data:
  k3s-manifests: