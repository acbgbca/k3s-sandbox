version: '2'

networks:
  default:
    ipam:
      config:
        - subnet:   192.168.132.0/24 # In order to specify static IPs, we must explicitly declare subnet.
          ip_range: 192.168.132.128/25 # Range for dynamic IPs. We'll make sure to assign static IPs outside this range.

services:
  dnsmasq:
    image: ghcr.io/acbgbca/dnsmasq:latest@sha256:b15a1407895670a8056e3c647ba0af1c09ed73b5d8acfeaa666a1601e8ecd2c6
    environment:
      - |
        DNSMASQ_CONF=
        address=/local/192.168.132.5
        address=/internal/192.168.132.5
        address=/homelab/192.168.132.5
    cap_add:
      - NET_ADMIN
    networks:
      default:
        ipv4_address: 192.168.132.2

  devcontainer:
    image: mcr.microsoft.com/devcontainers/base:2.1.8-ubuntu@sha256:7ee7da33a68d997971660d91ecc8372e55a38a777c3c6bd6808daf91928052db
    volumes:
      - ../..:/workspaces
      - k3s-config:/k3s/config
      - k3s-data:/k3s/data
      - k3s-manifests:/k3s/manifests
    command: sleep infinity
    network_mode: service:k3s

  k3s:
    image: "rancher/k3s:v1.35.4-k3s1@sha256:475e036b3fd595472c13ec708c148ffd95459d5f9e40e6df76ba4d5b27098570"
    command: server
    environment:
      - K3S_NODE_NAME=k3s
      - K3S_KUBECONFIG_MODE=644
    tmpfs:
    - /run
    - /var/run
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    privileged: true
    volumes:
    - k3s-data:/var/lib/rancher/k3s
    - k3s-config:/etc/rancher/k3s
    - k3s-manifests:/var/lib/rancher/k3s/server/manifests
    ports:
    - 6443:6443
    - 8080:80
    - 8443:443
    networks:
      default:
        ipv4_address: 192.168.132.5
    dns:
      - 192.168.132.2

  chromium:
    image: 'ghcr.io/linuxserver/chromium:latest@sha256:b02b6eaa8f104169866e1d77058b4e7710891cce5aba91239615190aea032c06'
    container_name: chromium
    ports:
      - 3000:6901
    shm_size: "1gb"
    dns:
      - 192.168.132.2

volumes:
  k3s-config:
  k3s-data:
  k3s-manifests: